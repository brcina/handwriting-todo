def frontendDir = projectDir

tasks.register('installDeps', Exec) {
    workingDir frontendDir
    commandLine 'npm', 'install'
}

tasks.register('buildFrontend', Exec) {
    dependsOn installDeps
    workingDir frontendDir
    commandLine 'npm', 'run', 'build'
}

// Kopiert Angular-Output nach backend/src/main/resources/static
tasks.register('copyToBackend', Copy) {
    dependsOn buildFrontend
    from "${frontendDir}/dist/handwriting-todo-fe/browser"
    into "${project(':handwriting-todo-be').projectDir}/src/main/resources/static"
}
